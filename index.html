<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Ooty 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useMemo } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { 
          MapPin, Coffee, Fuel, Droplets, Sun, Moon, AlertTriangle, 
          ExternalLink, Navigation, Clock, Users, Info, Mountain, 
          ArrowDown, Navigation2, Ticket, Timer, CheckSquare, 
          Home, ShoppingBag, Banknote, ListChecks, Route, Camera
        } from 'https://esm.sh/lucide-react@0.292.0';
        import {
          XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, AreaChart, Area
        } from 'https://esm.sh/recharts@2.12.7?deps=react@18.2.0,react-dom@18.2.0';

        // --- Itinerary Data ---
        const itineraryData = [
          { 
            id: 1, day: 1, time: "03:00 AM", title: "Trip Start", location: "Brigade Parkside East", 
            desc: "Start from Sarjapur Road. Head to NICE Road to connect with NH 275 Mysore Expressway.", 
            tags: ["info"], searchLink: "https://www.google.com/search?q=Brigade+Parkside+East+Bangalore", 
            distNext: 28, cumKm: 0, timing: "24/7 Departure", fee: "N/A"
          },
          { 
            id: 2, day: 1, time: "05:15 AM", title: "Kamat Lokaruchi", location: "Ramanagara (NH 275)", 
            desc: "Highest rated Pure Veg breakfast on NH 275. Try the Kadubu. Clean WCs available.", 
            tags: ["veg", "wc"], searchLink: "https://www.google.com/search?q=Kamat+Lokaruchi+Ramanagara+NH275", 
            distNext: 110, cumKm: 70, timing: "6 AM - 11 PM", fee: "₹300 avg"
          },
          { 
            id: 3, day: 1, time: "07:30 AM", title: "HP Fuel & Mysore Bypass", location: "Nanjangud (NH 766)", 
            desc: "Last reliable HP fuel stop before entering the Bandipur forest corridor.", 
            tags: ["fuel"], searchLink: "https://www.google.com/search?q=HP+Petrol+Pump+Nanjangud+NH766", 
            distNext: 123, cumKm: 180, timing: "24/7", fee: "Market Price"
          },
          { 
            id: 4, day: 1, time: "11:30 AM", title: "Pykara Lake Boating", location: "Ooty West (NH 181)", 
            desc: "Speedboat boating is a must-do for ages 20-30. Crystal clear lake views.", 
            tags: ["spot"], searchLink: "https://www.google.com/search?q=Pykara+Lake+Boating+Ooty", 
            distNext: 2, cumKm: 303, timing: "8:30 AM - 5:30 PM", fee: "Entry ₹10, Boat ₹800+"
          },
          { 
            id: 5, day: 1, time: "12:15 PM", title: "Pykara Falls", location: "NH 181", 
            desc: "Short trek from the lake to see the stepped waterfalls. Great group photo spot.", 
            tags: ["spot"], searchLink: "https://www.google.com/search?q=Pykara+Waterfalls+Ooty", 
            distNext: 4, cumKm: 305, timing: "8:30 AM - 5:00 PM", fee: "Included"
          },
          { 
            id: 6, day: 1, time: "01:00 PM", title: "Pine Forest & Shooting Area", location: "NH 181", 
            desc: "Stunning tall pines. Walk through the forest area where many films are shot.", 
            tags: ["spot"], searchLink: "https://www.google.com/search?q=Pine+Forest+Ooty+Shooting+Spot", 
            distNext: 15, cumKm: 309, timing: "8:00 AM - 6:00 PM", fee: "₹5 per head"
          },
          { 
            id: 7, day: 1, time: "02:45 PM", title: "Nahar Chandan Veg", location: "Ooty Town", 
            desc: "Premium Pure Veg lunch. High quality food and clean facilities for a group of 10.", 
            tags: ["veg", "wc"], searchLink: "https://www.google.com/search?q=Nahar+Chandan+Veg+Restaurant+Ooty", 
            distNext: 30, cumKm: 324, timing: "12 PM - 10 PM", fee: "₹400 avg"
          },
          { 
            id: 8, day: 1, time: "05:30 PM", title: "Kodanad Viewpoint", location: "Kotagiri", 
            desc: "Sunset at the edge of the world. Catch the orange glow over the Moyar river valley.", 
            tags: ["sunset"], searchLink: "https://www.google.com/search?q=Kodanad+View+Point+Kotagiri", 
            distNext: 5, cumKm: 354, timing: "9 AM - 6 PM", fee: "₹10 per head"
          },
          { 
            id: 9, day: 2, time: "09:30 AM", title: "Sim's Park", location: "Coonoor", 
            desc: "Exotic botanical garden in a valley. Beautiful flower shows and walking paths.", 
            tags: ["spot"], searchLink: "https://www.google.com/search?q=Sims+Park+Coonoor", 
            distNext: 3, cumKm: 354, timing: "9 AM - 6 PM", fee: "₹30 Adults"
          },
          { 
            id: 10, day: 2, time: "11:30 AM", title: "Highfield Tea & Choco Factory", location: "Coonoor", 
            desc: "Watch the tea processing and buy fresh homemade Nilgiri chocolates.", 
            tags: ["spot"], searchLink: "https://www.google.com/search?q=Highfield+Tea+Factory+Coonoor", 
            distNext: 15, cumKm: 357, timing: "9 AM - 6:30 PM", fee: "₹10 Tour"
          },
          { 
            id: 11, day: 3, time: "06:00 AM", title: "Doddabetta Peak", location: "Highest Peak", 
            desc: "Sunrise view of the entire Nilgiris range. Carry jackets (cold at 6 AM).", 
            tags: ["sunrise"], searchLink: "https://www.google.com/search?q=Doddabetta+Peak+Ooty", 
            distNext: 10, cumKm: 406, timing: "7 AM - 6 PM", fee: "₹10 Entry"
          },
          { 
            id: 12, day: 3, time: "02:30 PM", title: "Nijaguna Resort Lunch", location: "Gundlupet (NH 766)", 
            desc: "Best Pure Veg highway resort for the return leg. Premium washrooms.", 
            tags: ["veg", "wc"], searchLink: "https://www.google.com/search?q=Nijaguna+Resort+Gundlupet", 
            distNext: 185, cumKm: 579, timing: "12 PM - 10 PM", fee: "₹450 avg"
          }
        ];

        const elevationData = [
          { name: 'HOME', alt: 880 }, { name: 'MYS', alt: 760 }, { name: 'BAND', alt: 1000 },
          { name: 'PYK', alt: 2100 }, { name: 'OOTY', alt: 2240 }, { name: 'DBTA', alt: 2630 },
        ];

        const Badge = ({ children, color }) => {
          const colors = {
            veg: "bg-emerald-100 text-emerald-700 border-emerald-200",
            wc: "bg-amber-100 text-amber-700 border-amber-200",
            fuel: "bg-blue-100 text-blue-700 border-blue-200",
            info: "bg-slate-100 text-slate-700 border-slate-200",
            spot: "bg-indigo-100 text-indigo-700 border-indigo-200",
            sunrise: "bg-orange-100 text-orange-700 border-orange-200",
            sunset: "bg-purple-100 text-purple-700 border-purple-200",
          };
          return (
            <span className={`px-2 py-0.5 rounded text-[9px] font-black border uppercase tracking-tighter ${colors[color] || colors.info}`}>
              {children}
            </span>
          );
        };

        function App() {
          const [activeMainTab, setActiveMainTab] = useState('itinerary');
          const [activeDay, setActiveDay] = useState(1);
          const [filter, setFilter] = useState('all');
          const [showItineraryRef, setShowItineraryRef] = useState(false);

          const packingList = [
            { item: "Neck Pillow", detail: "Essential for 764km round trip" },
            { item: "Sunglasses", detail: "High altitude UV protection" },
            { item: "Anti-vomit Tablets", detail: "For 36+ hairpins in Ghat section" },
            { item: "Induction Cooker", detail: "For the Airbnb stay" },
            { item: "Milk Packets", detail: "Essential for early morning tea" },
            { item: "Car E-Pass", detail: "QR Code for TN entry (Mandatory)" },
            { item: "Walkie Talkies", detail: "For group coordination" },
            { item: "Power Banks", detail: "Stay charged on long routes" }
          ];

          const filteredData = useMemo(() => {
            let dayData = itineraryData.filter(item => item.day === activeDay);
            if (filter === 'all') return dayData;
            return dayData.filter(item => item.tags.includes(filter));
          }, [activeDay, filter]);

          return (
            <div className="min-h-screen bg-slate-50 text-slate-900 font-sans antialiased">
              
              {/* Hero Trip Banner */}
              <div className="w-full relative h-48 sm:h-64 overflow-hidden">
                <img 
                  src="image.png" 
                  alt="Mission Ooty 2026 Banner" 
                  className="w-full h-full object-cover"
                />
                <div className="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex items-end p-6">
                   <div className="flex flex-col text-white">
                      <h1 className="text-2xl font-black italic tracking-tighter uppercase leading-none">Mission Ooty 2026</h1>
                      <p className="text-xs font-bold opacity-90 tracking-widest mt-1">Expedition Nilgiris • NH 275 & 181</p>
                   </div>
                </div>
              </div>

              {/* App Header / Quick Stats */}
              <header className="sticky top-0 z-50 w-full bg-white/95 backdrop-blur-md border-b border-slate-200 px-6 py-4 flex justify-between items-center shadow-sm">
                <div className="flex flex-col">
                  <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none">Starting Point</p>
                  <h2 className="text-sm font-black text-slate-900">Brigade Parkside East</h2>
                </div>
                <div className="flex items-center gap-3">
                  <div className="text-right">
                     <p className="text-[8px] font-black text-slate-400 uppercase">Total RT</p>
                     <p className="text-[10px] font-black text-emerald-600">764 KM</p>
                  </div>
                  <div className="bg-emerald-600 p-2 rounded-xl">
                    <Route size={18} className="text-white" />
                  </div>
                </div>
              </header>

              {/* Main Content Area */}
              <main className="max-w-md mx-auto p-5 pb-32">
                
                {/* Tab Content: ITINERARY */}
                {activeMainTab === 'itinerary' && (
                  <div className="space-y-6 animate-in fade-in slide-in-from-bottom-2 duration-300">
                     
                    {/* Visual Guide Toggle */}
                    <div className="bg-emerald-50 border border-emerald-100 rounded-2xl p-4">
                      <button 
                        onClick={() => setShowItineraryRef(!showItineraryRef)}
                        className="flex items-center justify-between w-full"
                      >
                        <div className="flex items-center gap-3">
                          <Camera className="text-emerald-600" size={20} />
                          <span className="text-xs font-black text-emerald-900 uppercase tracking-tight">Visual Itinerary Reference</span>
                        </div>
                        <div className={`transition-transform duration-300 ${showItineraryRef ? 'rotate-180' : ''}`}>
                          <ArrowDown size={16} className="text-emerald-400" />
                        </div>
                      </button>
                      
                      {showItineraryRef && (
                        <div className="mt-4 animate-in zoom-in-95 duration-200">
                          <img 
                            src="image.png" 
                            alt="Itinerary Visual Guide" 
                            className="w-full rounded-xl shadow-lg border-2 border-emerald-200"
                          />
                          <p className="text-[10px] text-emerald-700 mt-2 font-bold italic">*This image is for high-level reference of listed spots.</p>
                        </div>
                      )}
                    </div>

                     {/* Sub-Nav: Day Selector */}
                    <div className="bg-slate-200/60 p-1 rounded-2xl flex gap-1 shadow-inner">
                      {[1, 2, 3].map(d => (
                        <button
                          key={d}
                          onClick={() => setActiveDay(d)}
                          className={`flex-1 py-3 text-xs font-black rounded-xl transition-all ${
                            activeDay === d ? 'bg-white shadow-md text-slate-900 scale-100' : 'text-slate-500 scale-95 opacity-70'
                          }`}
                        >
                          DAY {d}
                        </button>
                      ))}
                    </div>

                    {/* Sub-Nav: Filter Chips */}
                    <div className="flex gap-2 overflow-x-auto no-scrollbar py-1">
                      {[
                        { id: 'all', label: 'All', icon: <MapPin size={12}/> },
                        { id: 'veg', label: 'Pure Veg', icon: <Coffee size={12}/> },
                        { id: 'wc', label: 'Washroom', icon: <Droplets size={12}/> },
                        { id: 'fuel', label: 'Fuel', icon: <Fuel size={12}/> },
                      ].map(f => (
                        <button
                          key={f.id}
                          onClick={() => setFilter(f.id)}
                          className={`flex items-center gap-2 px-4 py-2.5 rounded-full text-[10px] font-black whitespace-nowrap transition-all border ${
                            filter === f.id 
                            ? 'bg-slate-900 text-white border-slate-900 shadow-md' 
                            : 'bg-white text-slate-500 border-slate-200'
                          }`}
                        >
                          {f.icon} {f.label}
                        </button>
                      ))}
                    </div>

                    {/* Timeline */}
                    <div className="space-y-4">
                      {filteredData.map((item, idx) => (
                        <div key={item.id} className="relative flex gap-4">
                          <div className="flex flex-col items-center shrink-0 w-8">
                            <div className={`z-10 w-8 h-8 rounded-full border-2 border-white shadow-md flex items-center justify-center ${
                              item.tags.includes('veg') ? 'bg-emerald-500' : 'bg-slate-400'
                            }`}>
                              {item.time.includes('AM') ? <Sun size={14} className="text-white"/> : <Moon size={14} className="text-white"/>}
                            </div>
                            {idx !== filteredData.length - 1 && <div className="w-0.5 grow bg-slate-200 my-1"></div>}
                          </div>

                          <div className="flex-1 bg-white rounded-3xl shadow-sm border border-slate-200 p-5 mb-1 hover:border-emerald-300 transition-colors">
                            <div className="flex justify-between items-center mb-3">
                              <span className="text-[10px] font-black text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded-lg border border-emerald-100 tracking-tighter uppercase">
                                {item.cumKm} KM
                              </span>
                              <div className="flex gap-1">{item.tags.map(t => <Badge key={t} color={t}>{t}</Badge>)}</div>
                            </div>
                            <h3 className="font-black text-sm text-slate-900 mb-1">{item.title}</h3>
                            <p className="text-[10px] font-bold text-slate-500 flex items-center gap-1 mb-3">
                              <MapPin size={10} className="text-emerald-500" /> {item.location}
                            </p>
                            <p className="text-[11px] text-slate-600 leading-relaxed mb-4">{item.desc}</p>
                            <div className="flex gap-2">
                               <a href={item.searchLink} target="_blank" className="flex-1 py-2.5 rounded-xl bg-slate-50 border border-slate-200 text-[10px] font-black text-center text-slate-600">GOOGLE INFO</a>
                               <a href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.location)}`} target="_blank" className="flex-[1.5] py-2.5 rounded-xl bg-zinc-900 text-white text-[10px] font-black text-center shadow-lg active:scale-95 transition-transform">NAVIGATE</a>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* Tab Content: STAY */}
                {activeMainTab === 'stay' && (
                  <div className="space-y-6 animate-in fade-in slide-in-from-bottom-2 duration-300">
                    <div className="bg-white rounded-[2.5rem] border border-slate-200 p-8 shadow-sm text-center">
                      <div className="bg-emerald-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner">
                        <Home className="text-emerald-700" size={32} />
                      </div>
                      <h2 className="text-xl font-black tracking-tight text-slate-900 mb-2 uppercase">Base Camp Stay</h2>
                      <p className="text-sm font-bold text-slate-500 leading-relaxed mb-6 italic">
                        Kotagiri, Tamil Nadu 643217, India
                      </p>
                      
                      <div className="space-y-4 bg-slate-50 p-6 rounded-[2rem] border border-slate-100">
                        <div className="flex justify-between items-center">
                          <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Pricing</span>
                          <span className="text-lg font-black text-emerald-700">₹41,749.19</span>
                        </div>
                        <div className="flex justify-between items-center">
                          <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Duration</span>
                          <span className="text-sm font-black text-slate-900">2 Nights Stay</span>
                        </div>
                        <div className="h-px bg-slate-200"></div>
                        <a 
                          href="https://www.airbnb.co.uk/rooms/51573417?unique_share_id=a4c1a5cb-031b-4b7f-87c2-5bdb3d9b646d&viralityEntryPoint=1&s=76" 
                          target="_blank" 
                          className="flex items-center justify-center gap-2 w-full py-4 bg-zinc-900 text-white rounded-2xl text-xs font-black uppercase tracking-widest shadow-xl active:scale-95 transition-all"
                        >
                          OPEN AIRBNB <ExternalLink size={14} />
                        </a>
                      </div>
                    </div>

                    <div className="bg-white rounded-3xl p-6 border border-slate-200 shadow-sm">
                      <h3 className="font-black text-xs uppercase tracking-widest text-slate-400 mb-4 flex items-center gap-2">
                        <Mountain size={16} className="text-emerald-600" /> Altitude Elevation
                      </h3>
                      <div className="h-32 w-full">
                        <ResponsiveContainer width="100%" height="100%">
                          <AreaChart data={elevationData}>
                            <defs><linearGradient id="colorAlt" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#10b981" stopOpacity={0.2}/><stop offset="95%" stopColor="#10b981" stopOpacity={0}/></linearGradient></defs>
                            <Area type="monotone" dataKey="alt" stroke="#10b981" strokeWidth={3} fillOpacity={1} fill="url(#colorAlt)" />
                          </AreaChart>
                        </ResponsiveContainer>
                      </div>
                    </div>
                  </div>
                )}

                {/* Tab Content: CHECKLIST */}
                {activeMainTab === 'checklist' && (
                  <div className="space-y-6 animate-in fade-in slide-in-from-bottom-2 duration-300">
                    <div className="flex items-center justify-between mb-4 px-2">
                      <h2 className="text-xl font-black text-slate-900 uppercase italic">Packing Essentials</h2>
                      <span className="text-[10px] font-black bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full uppercase">10 Guests</span>
                    </div>

                    <div className="grid grid-cols-1 gap-3">
                      {packingList.map((item, idx) => (
                        <div key={idx} className="bg-white border border-slate-200 p-5 rounded-3xl flex items-center gap-4 shadow-sm group active:bg-indigo-50 transition-colors">
                          <div className="w-10 h-10 rounded-2xl bg-indigo-50 flex items-center justify-center group-active:bg-white transition-colors">
                            <CheckSquare className="text-indigo-600" size={20} />
                          </div>
                          <div>
                            <h3 className="text-sm font-black text-slate-900 leading-none mb-1">{item.item}</h3>
                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">{item.detail}</p>
                          </div>
                        </div>
                      ))}
                    </div>

                    <div className="bg-orange-50 border border-orange-200 rounded-[2rem] p-6 mt-4">
                      <div className="flex items-center gap-3 mb-2">
                        <AlertTriangle className="text-orange-600" size={20} />
                        <h3 className="text-[11px] font-black text-orange-900 uppercase tracking-widest">Important Reminder</h3>
                      </div>
                      <p className="text-[11px] text-orange-700 font-bold leading-relaxed">
                        Ensure your car QR pass (TN E-Pass) is saved offline. There are significant network dead zones between Gundlupet and Ooty.
                      </p>
                    </div>
                  </div>
                )}

              </main>

              {/* Floating Bottom App Navigation */}
              <nav className="fixed bottom-0 w-full bg-white/95 backdrop-blur-md border-t border-slate-200 px-6 py-4 pb-8 flex justify-around items-center shadow-[0_-10px_30px_rgba(0,0,0,0.05)] z-[100]">
                {[
                  { id: 'itinerary', label: 'Routes', icon: <Route size={20} /> },
                  { id: 'stay', label: 'Stay', icon: <Home size={20} /> },
                  { id: 'checklist', label: 'Packing', icon: <ListChecks size={20} /> },
                ].map(tab => (
                  <button
                    key={tab.id}
                    onClick={() => setActiveMainTab(tab.id)}
                    className={`flex flex-col items-center gap-1 transition-all ${
                      activeMainTab === tab.id ? 'text-emerald-600 scale-110' : 'text-slate-400 hover:text-slate-600 opacity-60'
                    }`}
                  >
                    {tab.icon}
                    <span className="text-[9px] font-black uppercase tracking-tighter">{tab.label}</span>
                  </button>
                ))}
              </nav>

              <style>{`
                .no-scrollbar::-webkit-scrollbar { display: none; }
                .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
                @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
                @keyframes slide-in-from-bottom-2 { from { transform: translateY(0.5rem); } to { transform: translateY(0); } }
                @keyframes zoom-in-95 { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
                .animate-in { animation: fade-in 0.3s ease-out, slide-in-from-bottom-2 0.3s ease-out; }
                .zoom-in-95 { animation: zoom-in-95 0.2s ease-out; }
              `}</style>
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
